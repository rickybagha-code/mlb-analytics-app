<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1b35"/>
      <stop offset="100%" stop-color="#060d1a"/>
    </linearGradient>
    <linearGradient id="leftPage" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
    <linearGradient id="rightPage" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="flame" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
    <radialGradient id="tipGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#bae6fd" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#7dd3fc" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="14" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bookShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0a1628" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="400" height="400" rx="90" fill="url(#bg)"/>

  <!-- Ambient glow -->
  <ellipse cx="200" cy="205" rx="155" ry="135" fill="#1d4ed8" opacity="0.06"/>
  <ellipse cx="200" cy="168" rx="72" ry="72" fill="#06b6d4" opacity="0.07"/>

  <!-- Left book page -->
  <path d="M200,308 L66,269 L72,182 L200,228 Z" fill="url(#leftPage)" filter="url(#bookShadow)"/>
  <!-- Left page ruling lines -->
  <line x1="100" y1="257" x2="192" y2="271" stroke="#3b82f6" stroke-width="2.5" stroke-opacity="0.3"/>
  <line x1="93" y1="235" x2="190" y2="251" stroke="#3b82f6" stroke-width="2.5" stroke-opacity="0.28"/>
  <line x1="86" y1="213" x2="188" y2="231" stroke="#3b82f6" stroke-width="2.5" stroke-opacity="0.24"/>
  <line x1="78" y1="192" x2="186" y2="212" stroke="#3b82f6" stroke-width="2.5" stroke-opacity="0.18"/>
  <!-- Left page top-edge shine -->
  <path d="M200,228 L72,182 L78,175 L200,222 Z" fill="white" fill-opacity="0.07"/>

  <!-- Right book page -->
  <path d="M200,308 L334,269 L328,182 L200,228 Z" fill="url(#rightPage)" filter="url(#bookShadow)"/>
  <!-- Right page ruling lines -->
  <line x1="300" y1="257" x2="208" y2="271" stroke="#93c5fd" stroke-width="2.5" stroke-opacity="0.25"/>
  <line x1="307" y1="235" x2="210" y2="251" stroke="#93c5fd" stroke-width="2.5" stroke-opacity="0.23"/>
  <line x1="314" y1="213" x2="212" y2="231" stroke="#93c5fd" stroke-width="2.5" stroke-opacity="0.18"/>
  <line x1="322" y1="192" x2="214" y2="212" stroke="#93c5fd" stroke-width="2.5" stroke-opacity="0.15"/>
  <!-- Right page top-edge shine -->
  <path d="M200,228 L328,182 L322,175 L200,222 Z" fill="white" fill-opacity="0.09"/>

  <!-- Book spine -->
  <line x1="200" y1="228" x2="200" y2="308" stroke="#93c5fd" stroke-width="2.5" stroke-opacity="0.38"/>

  <!-- Flame — glow layer -->
  <path d="M200,228 C174,216 152,172 200,88 C248,172 226,216 200,228 Z"
    fill="#3b82f6" fill-opacity="0.45" filter="url(#glow)"/>

  <!-- Flame — main fill -->
  <path d="M200,228 C174,216 152,172 200,88 C248,172 226,216 200,228 Z"
    fill="url(#flame)"/>

  <!-- Flame — inner bright core -->
  <path d="M200,218 C188,207 184,175 200,108 C216,175 212,207 200,218 Z"
    fill="white" fill-opacity="0.17"/>

  <!-- Tip sparkle -->
  <circle cx="200" cy="88" r="26" fill="url(#tipGlow)"/>
  <circle cx="200" cy="88" r="6" fill="#e0f2fe" fill-opacity="0.95"/>
</svg>
