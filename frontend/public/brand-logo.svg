<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="400" fill="#0f1117"/>
  <!-- Home plate mark: 56×56 → ~240px tall. scale=4.286, center at (200,185) -->
  <!-- Plate: y=[8,52]=44 units tall → 4.286*44=188.6px. x=[7,49]=42 units wide → 4.286*42=180px -->
  <!-- translate so center x=200-(42/2*4.286)=200-90=110, y offset so plate centered vertically ~top at 90 -->
  <g transform="translate(110,65) scale(4.286)">
    <path d="M 7,8 L 49,8 L 49,36 L 28,52 L 7,36 Z" fill="white"/>
    <text x="28" y="34" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="900" fill="#0f1117">P</text>
  </g>
  <text x="200" y="350" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" letter-spacing="-1.1" fill="white">ProprStats</text>
  <text x="200" y="372" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="400" letter-spacing="3" fill="rgba(255,255,255,0.35)">MLB ANALYTICS</text>
</svg>
